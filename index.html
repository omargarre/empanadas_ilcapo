<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Pedido Il Capo di Tutti</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #111827;
      color: #f9fafb;
      padding: 10px;
    }

    h1 {
      text-align: center;
      font-size: 1.4rem;
      margin-bottom: 12px;
    }

    .top-actions, .detail-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      touch-action: manipulation;
    }

    .btn-primary { background:#22c55e; color:#111; }
    .btn-secondary { background:#2563eb; color:#fff; }
    .btn-copy { background:#f59e0b; color:#111; display:none; }
    .btn-copy-detail { background:#a855f7; color:#fff; display:none; }
    .btn-danger { background:#ef4444; color:#fff; }

    .table-wrap {
      overflow-x:auto;
      background:#1f2937;
      border-radius:12px;
      padding:8px;
      margin-bottom:14px;
    }

    table {
      width:100%;
      min-width:760px;
      border-collapse: collapse;
    }

    th, td {
      border:1px solid #374151;
      padding:8px;
      text-align:center;
    }

    th {
      background:#0f172a;
      position:sticky;
      top:0;
    }

    td:first-child, th:first-child {
      text-align:left;
      min-width:200px;
      position:sticky;
      left:0;
      background:#172033;
    }

    .counter {
      display:flex;
      justify-content:center;
      align-items:center;
      gap:6px;
    }

    .counter button {
      width:36px;
      height:36px;
      background:#374151;
      color:#fff;
      font-size:1.2rem;
      border-radius:8px;
    }

    textarea {
      width:100%;
      min-height:180px;
      border-radius:10px;
      padding:10px;
      font-size:1rem;
    }

    .result-box {
      background:#1f2937;
      border-radius:12px;
      padding:12px;
      margin-bottom:12px;
    }

    .total-box {
      font-weight:bold;
      margin-bottom:8px;
      color:#93c5fd;
    }
  </style>
</head>

<body>

<h1>Pedido Il Capo di Tutti</h1>

<div class="top-actions">
  <button class="btn-primary" onclick="agregarPersona()">+ Agregar persona</button>
  <button class="btn-secondary" onclick="generarPedido()">Generar pedido</button>
  <button class="btn-copy" id="btnCopiarWhatsapp" onclick="copiarPedidoWhatsapp()">Copiar pedido WhatsApp</button>
  <button class="btn-danger" onclick="limpiarPersonas()">Limpiar personas</button>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr id="header"><th>Variedad</th></tr>
    </thead>
    <tbody id="body"></tbody>
  </table>
</div>

<div class="result-box">
  <h3>Pedido para enviar</h3>
  <div class="total-box" id="totalVisible"></div>
  <textarea id="resultadoWhatsapp"></textarea>
</div>

<div class="result-box">
  <h3>Detalle con nombres</h3>
  <div class="detail-actions">
    <button class="btn-copy-detail" id="btnCopiarDetalle" onclick="copiarDetalle()">Copiar detalle</button>
  </div>
  <textarea id="resultadoDetalle"></textarea>
</div>

<script>
const variedades = [
  "Queso y Cebolla","Jamón y Queso","Pollo","Napolitana","Roquefort",
  "Cuatro Quesos","Champiñón Jamón y Ananá","Provolone y Panceta",
  "Carne","Carne Picante","Verdura","Choclo"
];

let personas = [];
let cantidades = {};

function init(){
  cantidades = {};
  variedades.forEach((_,i)=>{
    cantidades[i]={};
  });
}

function render(){
  const header = document.getElementById("header");
  const body = document.getElementById("body");

  header.innerHTML = "<th>Variedad</th>";
  personas.forEach((p,i)=>{
    header.innerHTML += `<th>${p} <button onclick="eliminarPersona(${i})">x</button></th>`;
  });

  body.innerHTML="";

  variedades.forEach((v,row)=>{
    let fila = `<tr><td>${v}</td>`;
    personas.forEach((_,col)=>{
      if(!cantidades[row][col]) cantidades[row][col]=0;

      fila += `
      <td>
        <div class="counter">
          <button onclick="cambiar(${row},${col},-1)">-</button>
          <span id="v-${row}-${col}">${cantidades[row][col]}</span>
          <button onclick="cambiar(${row},${col},1)">+</button>
        </div>
      </td>`;
    });
    fila+="</tr>";
    body.innerHTML+=fila;
  });
}

function cambiar(r,c,d){
  cantidades[r][c]+=d;
  if(cantidades[r][c]<0) cantidades[r][c]=0;
  document.getElementById(`v-${r}-${c}`).innerText=cantidades[r][c];
  limpiarResultados();
}

function agregarPersona(){
  let n=prompt("Nombre:");
  if(!n) return;
  personas.push(n);
  render();
}

function eliminarPersona(i){
  personas.splice(i,1);
  render();
  limpiarResultados();
}

function limpiarPersonas(){
  if(!confirm("Eliminar todas las personas?")) return;
  personas=[];
  cantidades={};
  init();
  render();
  limpiarResultados();
}

function generarPedido(){
  let txt="Pedido de empanadas:\n\n";
  let detalle="Detalle:\n\n";
  let total=0;

  variedades.forEach((v,r)=>{
    let suma=0;
    let det=[];

    personas.forEach((p,c)=>{
      let val=cantidades[r][c]||0;
      suma+=val;
      if(val>0) det.push(`${p}:${val}`);
    });

    if(suma>0){
      txt+=`${v}: ${suma}\n`;
      detalle+=`${v}: ${suma} (${det.join(", ")})\n`;
      total+=suma;
    }
  });

  txt+=`\nTotal: ${total}`;
  detalle+=`\nTotal: ${total}`;

  document.getElementById("resultadoWhatsapp").value=txt;
  document.getElementById("resultadoDetalle").value=detalle;
  document.getElementById("totalVisible").innerText="Total: "+total;

  document.getElementById("btnCopiarWhatsapp").style.display="inline-block";
  document.getElementById("btnCopiarDetalle").style.display="inline-block";
}

function limpiarResultados(){
  document.getElementById("resultadoWhatsapp").value="";
  document.getElementById("resultadoDetalle").value="";
  document.getElementById("btnCopiarWhatsapp").style.display="none";
  document.getElementById("btnCopiarDetalle").style.display="none";
  document.getElementById("totalVisible").innerText="";
}

async function copiarPedidoWhatsapp(){
  await navigator.clipboard.writeText(document.getElementById("resultadoWhatsapp").value);
  alert("Copiado");
}

async function copiarDetalle(){
  await navigator.clipboard.writeText(document.getElementById("resultadoDetalle").value);
  alert("Copiado");
}

// evita zoom doble tap
let last=0;
document.addEventListener("touchend",e=>{
  let now=Date.now();
  if(now-last<300)e.preventDefault();
  last=now;
},{passive:false});

init();
render();
</script>

</body>
</html>
